<nav [class.scrolled]="isScrolled()">
  <div class="nav-container">
    <a class="logo" [appSmoothScroll]="'inicio'">
      <img ngSrc="/assets/images/logo-navbar.png" alt="Asiri Huevos" class="logo-img" width="160" height="38" priority />
    </a>

    <ul class="nav-links" role="list">
      @for (link of navLinks; track link.targetId) {
        <li>
          <a [appSmoothScroll]="link.targetId">{{ link.label }}</a>
        </li>
      }
    </ul>

    <button class="btn-cta" [appSmoothScroll]="'contacto'">
      Contáctanos
    </button>

    <button
      class="hamburger"
      (click)="toggleMobile()"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-label="Menú de navegación"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (mobileMenuOpen()) {
    <div class="mobile-menu">
      @for (link of navLinks; track link.targetId) {
        <a [appSmoothScroll]="link.targetId" (click)="mobileMenuOpen.set(false)">
          {{ link.label }}
        </a>
      }
      <a class="mobile-cta" [appSmoothScroll]="'contacto'" (click)="mobileMenuOpen.set(false)">
        Contáctanos
      </a>
    </div>
  }
</nav>
