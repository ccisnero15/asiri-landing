<nav [class.scrolled]="isScrolled()" [class.is-dark]="theme.isDark()">
  <div class="nav-container">
    <a class="logo" [appSmoothScroll]="'inicio'">
      <img ngSrc="/assets/images/logo-navbar.png" alt="Asiri Huevos" class="logo-img" width="160" height="38" priority />
    </a>

    <ul class="nav-links" role="list">
      @for (link of navLinks; track link.targetId) {
        <li>
          <a [appSmoothScroll]="link.targetId">{{ link.label }}</a>
        </li>
      }
    </ul>

    <button class="btn-cta" [appSmoothScroll]="'contacto'">
      Contáctanos
    </button>

    <button
      class="btn-theme"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    >
      @if (theme.isDark()) {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <button
      class="hamburger"
      (click)="toggleMobile()"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-label="Menú de navegación"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  @if (mobileMenuOpen()) {
    <div class="mobile-menu">
      @for (link of navLinks; track link.targetId) {
        <a [appSmoothScroll]="link.targetId" (click)="mobileMenuOpen.set(false)">
          {{ link.label }}
        </a>
      }
      <a class="mobile-cta" [appSmoothScroll]="'contacto'" (click)="mobileMenuOpen.set(false)">
        Contáctanos
      </a>
    </div>
  }
</nav>
